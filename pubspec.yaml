name: coin_flow
description: "CoinFlow — Smart budget tracker with cloud sync, receipt scanning, and analytics."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  fl_chart: ^0.69.2
  intl: ^0.19.0
  provider: ^6.1.2
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.1
  google_sign_in: ^6.2.2
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  font_awesome_flutter: ^10.8.0
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  csv: ^6.0.0
  permission_handler: ^11.3.1
  firebase_messaging: ^15.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon_light.png"
  min_sdk_android: 21

# flutter_native_splash:
